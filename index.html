<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lintel Space · Supply Chain Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Firebase 10.x compat SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<style>
:root{
  /* Exact brand colors from Lintel Space Atelier brand guidelines (matches BOQ Generator) */
  --ink:#0D0D27; --ink2:#1A1A40; --paper:#F8F6F0; --card:#FFFFFF;
  --line:#E2DDD6; --txt:#0D0D27; --mut:#6B6560;
  --amber:#C9A55A; --amber-d:#A8864C;
  --gold-light:#FBF5E6; --gold-border:#D4B06A;
  --ok:#2E7D4F; --ok-bg:#E9F2EC;
  --warn:#A8864C; --warn-bg:#FBF5E6;
  --bad:#8C2A20; --bad-bg:#FBE9E7;
  --info:#2C1F5E; --info-bg:#ECEAF4;
  --mono:Georgia,'Times New Roman',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Times New Roman',Times,Georgia,serif;background:var(--paper);color:var(--txt);font-size:14.5px}
h1,h2,h3,.disp{font-family:'Times New Roman',Times,Georgia,serif}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13.5px}
.num,.ref{font-variant-numeric:tabular-nums}

/* ---------- header ---------- */
header{background:var(--ink);color:#fff;padding:0 22px}
.hbar{display:flex;align-items:center;gap:14px;height:62px}
.logo{display:flex;align-items:center;gap:12px}
.logo .mark{width:40px;height:40px;border-radius:50%;background:#fff;padding:2px;object-fit:contain;flex-shrink:0}
.logo b{font-family:'Times New Roman',Times,serif;font-weight:400;font-size:15px;letter-spacing:3px;text-transform:uppercase}
.logo span{font-size:10.5px;color:var(--amber);display:block;margin-top:2px;letter-spacing:1.5px;text-transform:uppercase}
.hbar .right{margin-left:auto;display:flex;gap:8px;align-items:center}
.userbox input{background:var(--ink2);border:1px solid #3A3A60;color:#fff;border-radius:5px;padding:6px 10px;width:140px}
.userbox input::placeholder{color:#9896A8}
.btn-sync{background:var(--ink2);border:1px solid #3A3A60;color:#E9C77D;border-radius:5px;padding:6px 12px;font-size:12.5px}
.btn-sync:hover{border-color:var(--amber);color:#fff}
nav{display:flex;gap:2px;overflow-x:auto}
nav button{background:none;border:none;color:#9896A8;padding:11px 15px;font-size:13.5px;letter-spacing:.3px;border-bottom:3px solid transparent;white-space:nowrap}
nav button.act{color:#E9C77D;border-bottom-color:var(--amber)}
nav button:hover{color:#fff}

/* ---------- layout ---------- */
main{max-width:1200px;margin:0 auto;padding:22px}
.pagehead{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.pagehead h2{font-size:19px;font-weight:700;color:var(--ink)}
.pagehead .sub{color:var(--mut);font-size:13px}
.pagehead .grow{flex:1}
.btn{border:none;border-radius:6px;padding:9px 16px;font-size:13.5px;font-weight:600;letter-spacing:.3px}
.btn-p{background:var(--amber);color:var(--ink);border:1px solid var(--gold-border)}
.btn-p:hover{background:var(--amber-d);color:#fff}
.btn-o{background:#fff;border:1px solid var(--line);color:var(--txt)}
.btn-o:hover{border-color:var(--gold-border);background:var(--gold-light)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:5px}
.btn-danger{background:var(--bad-bg);color:var(--bad)}

/* KPI cards */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.kpi .lab{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--mut)}
.kpi .val{font-size:24px;font-weight:700;color:var(--ink);margin-top:5px}
.kpi .val.money{font-size:19px}
.kpi.hot{border-left:4px solid var(--amber)}

/* tables */
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:18px}
.card .chead{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.card .chead h3{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:.3px}
.card .chead .grow{flex:1}
table{width:100%;border-collapse:collapse}
th{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--mut);text-align:left;padding:9px 14px;border-bottom:1px solid var(--line);background:#F2EFE8;font-weight:600}
td{padding:10px 14px;border-bottom:1px solid #EFECE4;font-size:13.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.click:hover{background:var(--gold-light);cursor:pointer}
.num{font-family:var(--mono);font-size:13px}
.ref{font-family:var(--mono);font-size:12.5px;color:var(--amber-d);font-weight:600}
.empty{padding:36px;text-align:center;color:var(--mut)}
.empty b{display:block;color:var(--txt);margin-bottom:4px;font-size:14px}

/* chips */
.chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.c-ok{background:var(--ok-bg);color:var(--ok)} .c-warn{background:var(--warn-bg);color:var(--warn)}
.c-bad{background:var(--bad-bg);color:var(--bad)} .c-info{background:var(--info-bg);color:var(--info)}
.c-mut{background:#EEEEE7;color:var(--mut)}

/* pipeline tracker (signature) */
.pipe{display:flex;align-items:center;gap:0;margin:6px 0}
.pipe .st{display:flex;flex-direction:column;align-items:center;min-width:74px;position:relative}
.pipe .dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--mut);z-index:1}
.pipe .st.done .dot{background:var(--ink);border-color:var(--ink);color:#E9C77D}
.pipe .st.part .dot{background:var(--amber);border-color:var(--gold-border);color:var(--ink)}
.pipe .st small{font-size:10.5px;color:var(--mut);margin-top:4px;text-align:center}
.pipe .st.done small,.pipe .st.part small{color:var(--txt);font-weight:600}
.pipe .ln{height:2px;background:var(--line);flex:1;min-width:18px;margin-bottom:16px}
.pipe .ln.done{background:var(--amber)}

/* forms / modal */
.overlay{position:fixed;inset:0;background:rgba(21,34,44,.55);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:10px;width:100%;max-width:680px;padding:22px;box-shadow:0 18px 50px rgba(0,0,0,.25)}
.modal h3{font-size:17px;color:var(--ink);margin-bottom:14px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.frow.f3{grid-template-columns:1fr 1fr 1fr}
.frow.f1{grid-template-columns:1fr}
.fld label{display:block;font-size:11.5px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:8px 10px;background:#fff}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:2px solid var(--amber);border-color:var(--gold-border)}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.note{font-size:12.5px;color:var(--mut);background:var(--gold-light);border:1px dashed var(--gold-border);border-radius:6px;padding:8px 10px;margin-bottom:12px}

/* PO line items */
.items th,.items td{padding:7px 8px}
.items input{width:100%;border:1px solid var(--line);border-radius:5px;padding:6px 8px}
.tots{display:flex;justify-content:flex-end;gap:26px;padding:12px 16px;background:#F2EFE8;border-top:1px solid var(--line);font-size:13.5px}
.tots b{font-family:var(--mono)}

/* detail view */
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px 22px;padding:14px 16px}
.dgrid .it small{display:block;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.dgrid .it span{font-size:13.5px;font-weight:500}
.searchbar{border:1px solid var(--line);border-radius:6px;padding:8px 12px;width:230px;background:#fff}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:8px;font-size:13.5px;display:none;z-index:99;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.kycdoc{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #EFEEE6}
.kycdoc .ic{width:30px;height:30px;border-radius:6px;background:var(--info-bg);color:var(--info);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
@media print{header,nav,.btn,.noprint{display:none!important}main{max-width:none;padding:0}.card{border:none}}
@media(max-width:700px){.frow,.frow.f3{grid-template-columns:1fr}.searchbar{width:100%}}

/* ---------- login screen ---------- */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--ink);flex-direction:column;gap:20px}
#login-screen img{width:120px;height:120px;border-radius:50%;object-fit:contain;background:#fff;padding:4px}
#login-screen h1{color:#fff;font-family:'Times New Roman',Times,serif;font-size:20px;letter-spacing:4px;text-transform:uppercase}
#login-sub{color:#9896A8;font-size:13px;text-align:center;line-height:1.7}
#login-sub strong{color:var(--amber)}
#login-btn{background:var(--amber);color:var(--ink);border:1px solid var(--gold-border);padding:12px 28px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;letter-spacing:.5px}
#login-btn:hover{background:var(--amber-d);color:#fff}
#login-error{color:var(--bad);background:var(--bad-bg);padding:10px 16px;border-radius:6px;display:none;font-size:13px;max-width:360px;text-align:center}
#app-wrap{display:none}
</style>
</head>

    <button data-t="pos" onclick="go('pos')">Purchase Orders</button>
    <button data-t="advances" onclick="go('advances')">Advances</button>
    <button data-t="invoices" onclick="go('invoices')">Invoices</button>
    <button data-t="payments" onclick="go('payments')">Payments & Ledger</button>

  </nav>
</header>

<main id="main"><div class="empty"><b>Loading shared data…</b>Connecting to Firebase cloud database.</div></main>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ================= FIREBASE CONFIG ================= */
// ⚠️ PASTE YOUR FIREBASE CONFIG HERE — from Firebase Console → Project Settings → Web App
const firebaseConfig = {
  apiKey: "AIzaSyANE182qLvSERFEbEHNRXPqFBL5mTgVpOo",
  authDomain: "lintelspace-scm.firebaseapp.com",
  projectId: "lintelspace-scm",
  storageBucket: "lintelspace-scm.firebasestorage.app",
  messagingSenderId: "647077252857",
  appId: "1:647077252857:web:74c80e07d61685ae011c28"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();
const auth = firebase.auth();
const DOC_REF = db.collection('lintelspace').doc('scm-v1');

/* ================= AUTH ================= */
let user = '';
let userEmail = '';

function signIn() {
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ hd: 'lintelspace.com' });
  auth.signInWithPopup(provider).catch(e => {
    document.getElementById('login-error').style.display = 'block';
    console.error('Auth error:', e);
  });
}
function signOut() {
  auth.signOut();
}
auth.onAuthStateChanged(u => {
  if (u) {
    const domain = u.email.split('@')[1];
    if (domain !== 'lintelspace.com') {
      document.getElementById('login-error').style.display = 'block';
      auth.signOut();
      return;
    }
    user = u.displayName || u.email.split('@')[0];
    userEmail = u.email;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-wrap').style.display = 'block';
    document.getElementById('hdr-user').textContent = user;
    loadAll();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-wrap').style.display = 'none';
    document.getElementById('login-error').style.display = 'none';
  }
});

/* ================= STATE & FIRESTORE STORAGE ================= */
let S={projects:[],vendors:[],pos:[],advances:[],invoices:[],payments:[],expenses:[],receipts:[],seq:{PRJ:0,V:0,PO:0,ADV:0,INV:0,PAY:0,EXP:0,RCT:0}};
let tab='dash';

async function loadAll(showMsg){
  try{
    const snap = await DOC_REF.get();
    if(snap.exists) S = snap.data();
  }catch(e){ console.error('Load error:', e); }
  // backward-compat defaults
  S.projects=S.projects||[];S.seq=S.seq||{};
  ['PRJ','V','PO','ADV','INV','PAY','EXP','RCT'].forEach(k=>S.seq[k]=S.seq[k]||0);
  S.expenses=S.expenses||[];S.receipts=S.receipts||[];
  S.vendors=S.vendors||[];S.pos=S.pos||[];S.advances=S.advances||[];
  S.invoices=S.invoices||[];S.payments=S.payments||[];
  if(showMsg)toast('Data refreshed from cloud');
  render();
}
async function saveAll(){
  try{
    await DOC_REF.set(JSON.parse(JSON.stringify(S)));
  }catch(e){toast('⚠ Save failed — check connection'); console.error('Save error:', e)}
}
function nid(p){S.seq[p]=(S.seq[p]||0)+1;const n=String(S.seq[p]).padStart(3,'0');
  return p==='PRJ'?'LSP-'+n : p==='V'?'VEN-'+n : p==='PO'?'LS-PO-'+n : p==='ADV'?'ADV-'+n : p==='INV'?'VIN-'+n : p==='EXP'?'EXP-'+n : p==='RCT'?'RCT-'+n : 'PAY-'+n;}

/* ================= HELPERS ================= */
const $=id=>document.getElementById(id);
const fmt=n=>'₹'+(Number(n)||0).toLocaleString('en-IN',{maximumFractionDigits:0});
const fmt2=n=>'₹'+(Number(n)||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const today=()=>new Date().toISOString().slice(0,10);
const dfmt=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—';
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const GSTIN_RE=/^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$/;
const PAN_RE=/^[A-Z]{5}[0-9]{4}[A-Z]{1}$/;
function validGSTIN(g){return GSTIN_RE.test((g||'').toUpperCase())}
function validPAN(p){return PAN_RE.test((p||'').toUpperCase())}
function toast(m){const t=$('toast');t.textContent=m;t.style.display='block';clearTimeout(t._x);t._x=setTimeout(()=>t.style.display='none',2600)}
function go(t){tab=t;document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('act',b.dataset.t===t));render()}
function openM(html){$('modal').innerHTML=html;$('overlay').classList.add('open')}
function closeM(){$('overlay').classList.remove('open')}
$('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeM()});

const vById=id=>S.vendors.find(v=>v.id===id)||{};
const poById=id=>S.pos.find(p=>p.id===id)||{};
const prById=id=>S.projects.find(p=>p.id===id)||{};
function prFin(pr){
  const pos=S.pos.filter(p=>p.projectId===pr.id&&p.status!=='Cancelled');
  let committed=0,adv=0,inv=0,paid=0;
  pos.forEach(p=>{const f=poFin(p);committed+=+p.total;adv+=f.adv;inv+=f.invTot;paid+=f.paid});
  const exp=S.expenses.filter(e=>e.projectId===pr.id).reduce((s,e)=>s+ +e.amount,0);
  const rcv=S.receipts.filter(r=>r.projectId===pr.id).reduce((s,r)=>s+ +r.amount,0);
  const value=+pr.value||0, cost=committed+exp;
  return {poCount:pos.length,committed,adv,inv,paid,exp,rcv,cost,
    margin:value-cost,marginPct:value?((value-cost)/value*100):0,
    cash:rcv-paid-exp,budgetLeft:(+pr.budget||0)-committed,toCollect:value-rcv};
}
function chipPrj(pr){
  const m={'Active':'c-ok','On Hold':'c-warn','Completed':'c-info','Closed':'c-mut'};
  return `<span class="chip ${m[pr.status]||'c-mut'}">${pr.status||'Active'}</span>`;
}
function poFin(po){
  const adv=S.advances.filter(a=>a.poId===po.id).reduce((s,a)=>s+ +a.amount,0);
  const invs=S.invoices.filter(i=>i.poId===po.id);
  const invTot=invs.reduce((s,i)=>s+ +i.total,0);
  const paid=S.payments.filter(p=>p.poId===po.id).reduce((s,p)=>s+ +p.amount,0);
  return {adv,invTot,invCount:invs.length,paid:paid+adv,paidOnly:paid,balance:(po.total||0)-(paid+adv)};
}
function chipPO(po){
  const m={'Draft':'c-mut','Released':'c-info','Closed':'c-ok','Cancelled':'c-bad'};
  return `<span class="chip ${m[po.status]||'c-mut'}">${po.status}</span>`;
}
function chipKYC(v){
  const m={'Verified':'c-ok','Submitted':'c-warn','Pending':'c-bad'};
  return `<span class="chip ${m[v.kycStatus]||'c-bad'}">KYC ${v.kycStatus||'Pending'}</span>`;
}

/* ================= RENDER ROUTER ================= */
function render(){
  const M=$('main');
  if(tab==='dash')M.innerHTML=rDash();
  else if(tab==='projects')M.innerHTML=rProjects();
  else if(tab==='vendors')M.innerHTML=rVendors();
  else if(tab==='pos')M.innerHTML=rPOs();
  else if(tab==='advances')M.innerHTML=rAdvances();
  else if(tab==='invoices')M.innerHTML=rInvoices();
  else if(tab==='payments')M.innerHTML=rPayments();
  else if(tab==='exprct')M.innerHTML=rExpRct();
}

/* ================= DASHBOARD ================= */
function rDash(){
  const openPOs=S.pos.filter(p=>p.status==='Released');
  const poVal=openPOs.reduce((s,p)=>s+ +p.total,0);
  const advOut=S.pos.reduce((s,p)=>{const f=poFin(p);return s+Math.max(0,f.adv- f.invTot>0?Math.min(f.adv,f.adv-f.paidOnly):0)},0);
  const totalAdv=S.advances.reduce((s,a)=>s+ +a.amount,0);
  const totalPaid=S.payments.reduce((s,p)=>s+ +p.amount,0)+totalAdv;
  const payable=S.pos.filter(p=>p.status!=='Cancelled').reduce((s,p)=>{const f=poFin(p);return s+Math.max(0,f.invTot-f.paid)},0);
  const kycPend=S.vendors.filter(v=>v.kycStatus!=='Verified').length;

  let rows=S.pos.slice().reverse().slice(0,8).map(p=>{
    const f=poFin(p),v=vById(p.vendorId);
    return `<tr class="click" onclick="viewPO('${p.id}')"><td class="ref">${p.id}</td><td>${esc(v.name||'—')}</td><td><span class="ref">${p.projectId||''}</span> ${esc(p.project||'')}</td>
      <td class="num">${fmt(p.total)}</td><td class="num">${fmt(f.paid)}</td><td class="num" style="color:${f.balance>0?'var(--warn)':'var(--ok)'}">${fmt(f.balance)}</td><td>${chipPO(p)}</td></tr>`;
  }).join('');

  const prRows=S.projects.filter(p=>p.status==='Active').map(pr=>{
    const f=prFin(pr);
    return `<tr class="click" onclick="viewProject('${pr.id}')"><td class="ref">${pr.id}</td><td><b>${esc(pr.name)}</b></td><td>${esc(pr.client||'')}</td>
    <td class="num">${fmt(pr.value)}</td><td class="num">${fmt(f.cost)}</td><td class="num" style="color:var(--ok)">${fmt(f.rcv)}</td>
    <td class="num" style="color:${f.cash>=0?'var(--ok)':'var(--bad)'}">${fmt(f.cash)}</td>
    <td class="num" style="color:${f.margin>=0?'var(--ok)':'var(--bad)'}"><b>${fmt(f.margin)}</b></td></tr>`;
  }).join('');
  const totRcv=S.receipts.reduce((s,r)=>s+ +r.amount,0);
  const totExp=S.expenses.reduce((s,e)=>s+ +e.amount,0);

  return `<div class="pagehead"><h2>Supply Chain Overview</h2><span class="sub">Procure-to-pay status across all projects</span></div>
  <div class="kpis">
    <div class="kpi"><div class="lab">Active projects</div><div class="val">${S.projects.filter(p=>p.status==='Active').length}</div></div>
    <div class="kpi"><div class="lab">Vendors</div><div class="val">${S.vendors.length}</div></div>
    <div class="kpi ${kycPend?'hot':''}"><div class="lab">KYC pending</div><div class="val">${kycPend}</div></div>
    <div class="kpi"><div class="lab">Open POs</div><div class="val">${openPOs.length}</div></div>
    <div class="kpi"><div class="lab">Open PO value</div><div class="val money">${fmt(poVal)}</div></div>
    <div class="kpi"><div class="lab">Advances released</div><div class="val money">${fmt(totalAdv)}</div></div>
    <div class="kpi hot"><div class="lab">Invoices payable</div><div class="val money">${fmt(payable)}</div></div>
    <div class="kpi"><div class="lab">Received from clients</div><div class="val money" style="color:var(--ok)">${fmt(totRcv)}</div></div>
    <div class="kpi"><div class="lab">Site expenses</div><div class="val money">${fmt(totExp)}</div></div>
    <div class="kpi"><div class="lab">Total paid out</div><div class="val money">${fmt(totalPaid)}</div></div>
  </div>
  ${prRows?`<div class="card"><div class="chead"><h3>Project P&L snapshot</h3><div class="grow"></div><button class="btn btn-o btn-sm" onclick="go('projects')">All projects →</button></div>
  <div style="overflow-x:auto"><table><tr><th>ID</th><th>Project</th><th>Client</th><th>Contract value</th><th>Total cost</th><th>Received</th><th>Cash position</th><th>Margin</th></tr>${prRows}</table></div></div>`:''}
  <div class="card"><div class="chead"><h3>Recent purchase orders</h3><div class="grow"></div><button class="btn btn-p btn-sm" onclick="formPO()">+ New PO</button></div>
  ${S.pos.length?`<div style="overflow-x:auto"><table><tr><th>PO No.</th><th>Vendor</th><th>Project</th><th>PO value</th><th>Paid</th><th>Balance</th><th>Status</th></tr>${rows}</table></div>`
  :`<div class="empty"><b>No purchase orders yet</b>Create a project and add a vendor first — then release your PO inside that project.</div>`}</div>
  <div class="note noprint">This dashboard is backed by Firebase — every team member signed in with their <b>@lintelspace.com</b> Google account sees and edits the same live data. Press <b>Refresh</b> to pull the latest changes, or <b>Export</b> to download a full Excel backup.</div>`;
}

/* ================= PROJECTS & P&L ================= */
function rProjects(){
  const rows=S.projects.slice().reverse().map(pr=>{
    const f=prFin(pr);
    return `<tr class="click" onclick="viewProject('${pr.id}')"><td class="ref">${pr.id}</td>
    <td><b>${esc(pr.name)}</b><br><small style="color:var(--mut)">${esc(pr.location||'')}</small></td>
    <td>${esc(pr.client||'—')}</td><td class="num">${fmt(pr.value)}</td>
    <td class="num">${f.poCount} / ${fmt(f.committed)}</td><td class="num">${fmt(f.exp)}</td>
    <td class="num" style="color:var(--ok)">${fmt(f.rcv)}</td>
    <td class="num" style="color:${f.margin>=0?'var(--ok)':'var(--bad)'}"><b>${fmt(f.margin)}</b><br><small>${f.marginPct.toFixed(1)}%</small></td>
    <td>${chipPrj(pr)}</td></tr>`;
  }).join('');
  return `<div class="pagehead"><h2>Projects & P&L</h2><span class="sub">Every PO, expense and receipt is tagged to a project — margin stays visible</span><div class="grow"></div>
  <button class="btn btn-p" onclick="formProject()">+ New project</button></div>
  <div class="card">${S.projects.length?`<div style="overflow-x:auto"><table><tr><th>Project ID</th><th>Project</th><th>Client</th><th>Contract value</th><th>POs / committed</th><th>Expenses</th><th>Received</th><th>Margin (value − cost)</th><th>Status</th></tr>${rows}</table></div>`
  :`<div class="empty"><b>No projects yet</b>Create a project with its client and contract value first — POs can only be released inside a project.</div>`}</div>`;
}

function formProject(id){
  const pr=id?prById(id):{};
  openM(`<h3>${id?'Edit project':'New project'}</h3>
  <div class="frow"><div class="fld"><label>Project name *</label><input id="j_name" value="${esc(pr.name||'')}" placeholder="e.g. Whitefield Villa B-12"></div>
  <div class="fld"><label>Client name *</label><input id="j_client" value="${esc(pr.client||'')}"></div></div>
  <div class="frow f3"><div class="fld"><label>Contract value (₹)</label><input type="number" id="j_value" value="${pr.value||''}"></div>
  <div class="fld"><label>Procurement budget (₹)</label><input type="number" id="j_budget" value="${pr.budget||''}" placeholder="Optional cap for POs"></div>
  <div class="fld"><label>Status</label><select id="j_status">${['Active','On Hold','Completed','Closed'].map(s=>`<option ${pr.status===s?'selected':''}>${s}</option>`).join('')}</select></div></div>
  <div class="frow"><div class="fld"><label>Location / site</label><input id="j_loc" value="${esc(pr.location||'')}"></div>
  <div class="fld"><label>Start date</label><input type="date" id="j_start" value="${pr.start||today()}"></div></div>
  <div class="frow f1"><div class="fld"><label>Notes</label><input id="j_notes" value="${esc(pr.notes||'')}"></div></div>
  <div class="mfoot"><button class="btn btn-o" onclick="closeM()">Cancel</button><button class="btn btn-p" onclick="saveProject('${id||''}')">${id?'Save changes':'Create project'}</button></div>`);
}
async function saveProject(id){
  const name=$('j_name').value.trim(),client=$('j_client').value.trim();
  if(!name)return toast('Project name is required');
  if(!client)return toast('Client name is required');
  const d={name,client,value:+$('j_value').value||0,budget:+$('j_budget').value||0,status:$('j_status').value,
    location:$('j_loc').value.trim(),start:$('j_start').value,notes:$('j_notes').value.trim()};
  if(id){Object.assign(prById(id),d);}
  else{S.projects.push({id:nid('PRJ'),createdBy:user,createdAt:today(),...d});}
  await saveAll();closeM();render();toast(id?'Project updated':'Project created — you can now release POs inside it');
}

function viewProject(id){
  const pr=prById(id),f=prFin(pr);
  const pos=S.pos.filter(p=>p.projectId===id).slice().reverse();
  const rows=pos.map(p=>{
    const pf=poFin(p),v=vById(p.vendorId);
    return `<tr class="click" onclick="viewPO('${p.id}')"><td class="ref">${p.id}</td><td>${esc(v.name||'—')}</td>
    <td class="num">${fmt(p.total)}</td><td class="num">${fmt(pf.adv)}</td><td class="num">${fmt(pf.invTot)}</td>
    <td class="num">${fmt(pf.paid)}</td><td>${chipPO(p)}</td></tr>`;
  }).join('');
  const overBudget=pr.budget&&f.committed>pr.budget;
  const exps=S.expenses.filter(e=>e.projectId===id).slice().reverse().slice(0,5);
  const rcts=S.receipts.filter(r=>r.projectId===id).slice().reverse().slice(0,5);
  openM(`<h3>${esc(pr.name)} <span class="ref">${pr.id}</span></h3>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">${chipPrj(pr)}
  <span style="color:var(--mut);font-size:12.5px">Client: <b style="color:var(--txt)">${esc(pr.client||'—')}</b> · ${esc(pr.location||'')} · since ${dfmt(pr.start)}</span></div>
  <div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(135px,1fr))">
    <div class="kpi"><div class="lab">Contract value</div><div class="val money">${fmt(pr.value)}</div></div>
    <div class="kpi"><div class="lab">Received from client</div><div class="val money" style="color:var(--ok)">${fmt(f.rcv)}</div></div>
    <div class="kpi ${overBudget?'hot':''}"><div class="lab">PO committed</div><div class="val money">${fmt(f.committed)}</div></div>
    <div class="kpi"><div class="lab">Site expenses</div><div class="val money">${fmt(f.exp)}</div></div>
    <div class="kpi"><div class="lab">Total cost</div><div class="val money">${fmt(f.cost)}</div></div>
    <div class="kpi hot"><div class="lab">Margin (${f.marginPct.toFixed(1)}%)</div><div class="val money" style="color:${f.margin>=0?'var(--ok)':'var(--bad)'}">${fmt(f.margin)}</div></div>
  </div>
  <div class="note"><b>Cash position:</b> received ${fmt(f.rcv)} − paid to vendors ${fmt(f.paid)} − expenses ${fmt(f.exp)} =
  <b style="color:${f.cash>=0?'var(--ok)':'var(--bad)'}">${fmt(f.cash)}</b>
  &nbsp;·&nbsp; balance to collect from client: <b>${fmt(Math.max(0,f.toCollect))}</b></div>
  ${pr.budget?`<div class="note">Procurement budget <b>${fmt(pr.budget)}</b> · committed <b>${fmt(f.committed)}</b> · ${overBudget?`<b style="color:var(--bad)">OVER BUDGET by ${fmt(-f.budgetLeft)}</b>`:`remaining <b style="color:var(--ok)">${fmt(f.budgetLeft)}</b>`}</div>`:''}
  <div class="card"><div class="chead"><h3>POs in this project (${f.poCount})</h3><div class="grow"></div>
  <button class="btn btn-p btn-sm" onclick="closeM();formPO('${id}')">+ Release PO in this project</button></div>
  ${rows?`<div style="overflow-x:auto"><table><tr><th>PO No.</th><th>Vendor</th><th>Value</th><th>Advance</th><th>Invoiced</th><th>Paid</th><th>Status</th></tr>${rows}</table></div>`
  :`<div class="empty">No POs released in this project yet.</div>`}</div>
  <div class="card"><div class="chead"><h3>Client receipts</h3><div class="grow"></div><button class="btn btn-o btn-sm" onclick="closeM();formReceipt('${id}')">+ Receipt</button></div>
  ${rcts.length?`<table><tr><th>Date</th><th>Stage</th><th>Amount</th><th>Mode</th></tr>${rcts.map(r=>`<tr><td>${dfmt(r.date)}</td><td>${esc(r.stage)}</td><td class="num">${fmt(r.amount)}</td><td>${esc(r.mode)}</td></tr>`).join('')}</table>`
  :`<div class="empty">No client receipts recorded.</div>`}</div>
  <div class="card"><div class="chead"><h3>Site expenses</h3><div class="grow"></div><button class="btn btn-o btn-sm" onclick="closeM();formExpense('${id}')">+ Expense</button></div>
  ${exps.length?`<table><tr><th>Date</th><th>Category</th><th>Description</th><th>Amount</th></tr>${exps.map(e=>`<tr><td>${dfmt(e.date)}</td><td>${esc(e.category)}</td><td>${esc(e.desc||'')}</td><td class="num">${fmt(e.amount)}</td></tr>`).join('')}</table>`
  :`<div class="empty">No site expenses recorded.</div>`}</div>
  <div class="mfoot"><button class="btn btn-danger" onclick="delProject('${id}')">Delete</button><div style="flex:1"></div>
  <button class="btn btn-o" onclick="formProject('${id}')">Edit project</button><button class="btn btn-o" onclick="closeM()">Close</button></div>`);
}
async function delProject(id){
  if(S.pos.some(p=>p.projectId===id))return toast('Project has POs — cannot delete');
  if(!confirm('Delete this project permanently?'))return;
  S.projects=S.projects.filter(p=>p.id!==id);await saveAll();closeM();render();toast('Project deleted');
}

/* ================= VENDORS ================= */
function rVendors(){
  const q=(window.__vq||'').toLowerCase();
  const list=S.vendors.filter(v=>!q||(v.name+v.category+v.materials+(v.gstin||'')).toLowerCase().includes(q));
  const rows=list.map(v=>{
    const poC=S.pos.filter(p=>p.vendorId===v.id).length;
    return `<tr class="click" onclick="viewVendor('${v.id}')"><td class="ref">${v.id}</td><td><b>${esc(v.name)}</b><br><small style="color:var(--mut)">${esc(v.materials||'')}</small></td>
    <td>${esc(v.category||'')}</td><td>${esc(v.contact||'')}<br><small class="num">${esc(v.phone||'')}</small></td>
    <td class="num">${esc(v.gstin||'—')}</td><td>${poC}</td><td>${chipKYC(v)}</td></tr>`;
  }).join('');
  return `<div class="pagehead"><h2>Vendor Database</h2><span class="sub">Material suppliers, subcontractors & service vendors</span><div class="grow"></div>

async function saveVendor(id){
  const name=$('f_name').value.trim();
  if(!name)return toast('Vendor name is required');
  const gstin=$('f_gst').value.trim().toUpperCase();
  const pan=$('f_pan').value.trim().toUpperCase();
  if(!gstin)return toast('GSTIN is mandatory');
  if(!validGSTIN(gstin))return toast('Invalid GSTIN format — must be 15 characters (e.g. 29ABCDE1234F1Z5)');
  if(!pan)return toast('PAN is mandatory');
  if(!validPAN(pan))return toast('Invalid PAN format — must be 10 characters (e.g. ABCDE1234F)');
  if(gstin.substring(2,12)!==pan)return toast('GSTIN characters 3–12 must match the PAN number');
  const d={name,category:$('f_cat').value,materials:$('f_mat').value.trim(),contact:$('f_con').value.trim(),
    phone:$('f_ph').value.trim(),email:$('f_em').value.trim(),gstin,
    pan,bankAcc:$('f_acc').value.trim(),ifsc:$('f_ifsc').value.trim().toUpperCase(),
    terms:$('f_terms').value.trim(),address:$('f_addr').value.trim()};
  if(id){Object.assign(vById(id),d);}
  else{S.vendors.push({id:nid('V'),kycStatus:'Pending',kycDocs:[],createdBy:user,createdAt:today(),...d});}
  await saveAll();closeM();render();toast(id?'Vendor updated':'Vendor added');
}

  const docs=(v.kycDocs||[]).map((d,i)=>`<div class="kycdoc"><div class="ic">${d.name.split('.').pop().slice(0,3).toUpperCase()}</div>

    <div class="it"><small>Bank</small><span class="num">${esc(v.bankAcc||'—')} ${v.ifsc?'/ '+esc(v.ifsc):''}</span></div>
    <div class="it"><small>Payment terms</small><span>${esc(v.terms||'—')}</span></div>
    <div class="it"><small>Total PO value</small><span class="num">${fmt(ledger.po)}</span></div>

    <select id="kycType" style="border:1px solid var(--line);border-radius:5px;padding:5px 8px;font-size:12px">
      <option>GST Certificate</option><option>PAN Card</option><option>Cancelled Cheque</option><option>MSME / Udyam</option><option>Agreement</option><option>Other</option></select>

    ${v.kycStatus!=='Verified'?`<button class="btn btn-o btn-sm" onclick="setKYC('${id}','Verified')">✓ Mark verified</button>`:`<button class="btn btn-o btn-sm" onclick="setKYC('${id}','Pending')">Revoke</button>`}

async function setKYC(id,st){
  const v=vById(id);
  if(st==='Verified'){
    if(!validGSTIN(v.gstin))return toast('Cannot verify — GSTIN is missing or invalid');
    if(!validPAN(v.pan))return toast('Cannot verify — PAN is missing or invalid');
    if(!(v.kycDocs||[]).length)return toast('Cannot verify — upload at least one KYC document (GST certificate or PAN)');
  }
  v.kycStatus=st;if((v.kycDocs||[]).length===0&&st!=='Verified')v.kycStatus='Pending';
  await saveAll();viewVendor(id);render();toast('KYC status: '+st);
}
async function uploadKYC(id){
  const f=$('kycFile').files[0];if(!f)return;
  if(f.size>5*1024*1024)return toast('File too large — keep KYC files under 5 MB');
  const storagePath=`kyc/${id}/${Date.now()}-${f.name}`;
  try{
    toast('Uploading…');
    const ref=storage.ref(storagePath);
    await ref.put(f);
    const url=await ref.getDownloadURL();
    const v=vById(id);v.kycDocs=v.kycDocs||[];
    v.kycDocs.push({type:$('kycType').value,name:f.name,path:storagePath,url:url,date:today(),by:user});
    if(v.kycStatus==='Pending')v.kycStatus='Submitted';
    await saveAll();viewVendor(id);render();toast('Document uploaded');
  }catch(e){toast('Upload failed: '+e.message);console.error(e)}
}
async function viewDoc(id,i){
  const d=vById(id).kycDocs[i];
  try{
    const url = d.url || await storage.ref(d.path).getDownloadURL();
    const isImg = /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(d.name);
    openM(`<h3>${esc(d.type)} — ${esc(d.name)}</h3>
    ${isImg?`<img src="${url}" style="max-width:100%;border:1px solid var(--line);border-radius:6px">`
    :`<iframe src="${url}" style="width:100%;height:65vh;border:1px solid var(--line);border-radius:6px"></iframe>`}
    <div class="mfoot"><a class="btn btn-o" href="${url}" target="_blank" style="text-decoration:none">Open / download</a><button class="btn btn-o" onclick="viewVendor('${id}')">Back</button></div>`);
  }catch(e){toast('Could not load document')}
}
async function delDoc(id,i){
  const v=vById(id);const d=v.kycDocs[i];
  if(!confirm('Delete '+d.name+'?'))return;
  try{if(d.path)await storage.ref(d.path).delete()}catch(e){console.warn('Storage delete skipped:',e)}
  v.kycDocs.splice(i,1);if(!v.kycDocs.length&&v.kycStatus==='Submitted')v.kycStatus='Pending';
  await saveAll();viewVendor(id);render();
}
async function delVendor(id){
  if(S.pos.some(p=>p.vendorId===id))return toast('Vendor has POs — cannot delete');
  if(!confirm('Delete this vendor permanently?'))return;
  S.vendors=S.vendors.filter(v=>v.id!==id);await saveAll();closeM();render();toast('Vendor deleted');
}

function poBudgetHint(){
  const pr=prById($('p_prj').value),f=prFin(pr);
  $('p_bhint').innerHTML=`<b>${esc(pr.name)}</b> · client ${esc(pr.client||'—')} · contract ${fmt(pr.value)} · already committed in POs <b>${fmt(f.committed)}</b>${pr.budget?` · budget remaining <b style="color:${f.budgetLeft>0?'var(--ok)':'var(--bad)'}">${fmt(f.budgetLeft)}</b>`:''}`;
}
function drawItems(){
  $('itemRows').innerHTML=window.__items.map((it,i)=>`<tr>
  <td><input value="${esc(it.desc)}" oninput="window.__items[${i}].desc=this.value" placeholder="e.g. OPC 53 Grade Cement"></td>
  <td><input value="${esc(it.unit)}" style="width:64px" oninput="window.__items[${i}].unit=this.value"></td>
  <td><input type="number" value="${it.qty}" style="width:80px" oninput="window.__items[${i}].qty=this.value;calcPO()"></td>
  <td><input type="number" value="${it.rate}" style="width:100px" oninput="window.__items[${i}].rate=this.value;calcPO()"></td>
  <td class="num" id="amt${i}">${fmt(it.qty*it.rate)}</td>
  <td>${window.__items.length>1?`<button class="btn btn-danger btn-sm" onclick="window.__items.splice(${i},1);drawItems();calcPO()">✕</button>`:''}</td></tr>`).join('');
  calcPO();
}
function addItem(){window.__items.push({desc:'',unit:'Nos',qty:1,rate:0});drawItems()}
function calcPO(){
  const sub=window.__items.reduce((s,it)=>s+(+it.qty||0)*(+it.rate||0),0);
  const g=sub*((+$('p_gst').value||0)/100);
  window.__items.forEach((it,i)=>{const e=$('amt'+i);if(e)e.textContent=fmt((+it.qty||0)*(+it.rate||0))});
  $('t_sub').textContent=fmt2(sub);$('t_gst').textContent=fmt2(g);$('t_tot').textContent=fmt2(sub+g);
}
async function savePO(status){
  const prjId=$('p_prj').value, pr=prById(prjId);
  const items=window.__items.filter(i=>i.desc.trim());
  if(!items.length)return toast('Add at least one line item');
  const sub=items.reduce((s,it)=>s+(+it.qty)*(+it.rate),0);
  const gstP=+$('p_gst').value||0, gst=sub*gstP/100, total=sub+gst;
  if(pr.budget&&(prFin(pr).committed+total)>pr.budget&&!confirm('⚠ This PO takes the project OVER its procurement budget. Release anyway?'))return;
  S.pos.push({id:nid('PO'),projectId:prjId,project:pr.name,client:pr.client,vendorId:$('p_v').value,date:$('p_date').value,delivery:$('p_del').value,
    terms:$('p_terms').value.trim(),notes:$('p_notes').value.trim(),items,gstP,sub,gst,total,
    status,releasedAt:status==='Released'?today():null,createdBy:user});
  await saveAll();closeM();render();toast(status==='Released'?'PO released under '+pr.id:'PO saved as draft');
}

</table>

${p.notes?`<p style="font-size:11px;margin-bottom:10px"><b>Special instructions:</b> ${esc(p.notes)}</p>`:''}

<div class="tc">
<h3>Terms & Conditions</h3>
<ol>
<li><b>Acceptance:</b> This Purchase Order becomes binding upon the Vendor's written acknowledgement or commencement of work/supply, whichever is earlier. Any deviations from specifications, pricing or scope require prior written approval from Lintel Space Atelier.</li>

<li><b>Invoicing:</b> The Vendor shall raise a GST-compliant tax invoice mentioning this PO number, with correct HSN/SAC codes. E-way bill must accompany all inter-state shipments. Invoice without PO reference will not be processed for payment.</li>
<li><b>Payment:</b> Payment will be processed only after receipt of a valid tax invoice and satisfactory delivery/completion verified by site team. Payment terms are as stated in this PO. TDS shall be deducted at applicable rates as per the Income Tax Act, 1961.</li>
<li><b>Warranty:</b> The Vendor warrants all materials/work against defects in material and workmanship for a minimum period of 12 months from the date of handover to the end client, or 18 months from the date of supply to Lintel Space Atelier, whichever is later. Defective materials shall be replaced at the Vendor's cost including transportation and installation.</li>

<div class="sig-grid">
  <div><div class="box"><b>For Lintel Space Atelier</b><br/>Authorised Signatory</div></div>
  <div><div class="box"><b>For ${esc(v.name||'Vendor')}</b><br/>Vendor Acknowledgement & Stamp</div></div>
</div>

<div class="footer">This is a system-generated Purchase Order from Lintel Space Atelier India Private Limited. · Document ref: ${esc(p.id)} · Generated: ${dfmt(today())}</div>

</body></html>`);
  w.document.close();
  setTimeout(()=>w.print(),400);
}

/* ================= ADVANCES ================= */
function rAdvances(){
  const rows=S.advances.slice().reverse().map(a=>{
    const p=poById(a.poId),v=vById(p.vendorId);
    return `<tr><td class="ref">${a.id}</td><td>${dfmt(a.date)}</td><td><b>${esc(v.name||'—')}</b></td>
    <td class="ref">${a.poId}</td><td class="num">${fmt(a.amount)}</td><td>${esc(a.mode)}</td><td class="num">${esc(a.ref||'—')}</td><td>${esc(a.by||'')}</td></tr>`;
  }).join('');
  return `<div class="pagehead"><h2>Advances to Vendors</h2><span class="sub">Mobilisation / material advances released against POs</span><div class="grow"></div>
  <button class="btn btn-p" onclick="formAdvance()">+ Release advance</button></div>
  <div class="card">${S.advances.length?`<div style="overflow-x:auto"><table><tr><th>Ref</th><th>Date</th><th>Vendor</th><th>Against PO</th><th>Amount</th><th>Mode</th><th>UTR / Cheque</th><th>By</th></tr>${rows}</table></div>`
  :`<div class="empty"><b>No advances released</b>Release an advance against a released PO — it auto-adjusts in the vendor ledger.</div>`}</div>`;
}
function formAdvance(poId){
  const pos=S.pos.filter(p=>p.status==='Released');
  if(!pos.length)return toast('No released POs — release a PO first');
  openM(`<h3>Release advance</h3>
  <div class="frow"><div class="fld"><label>Against PO *</label><select id="a_po" onchange="advHint()">${pos.map(p=>`<option value="${p.id}" ${p.id===poId?'selected':''}>${p.id} — ${esc(vById(p.vendorId).name)} (${fmt(p.total)})</option>`).join('')}</select></div>
  <div class="fld"><label>Date</label><input type="date" id="a_date" value="${today()}"></div></div>
  <div class="frow f3"><div class="fld"><label>Amount (₹) *</label><input type="number" id="a_amt" oninput="advHint()"></div>
  <div class="fld"><label>Mode</label><select id="a_mode"><option>NEFT/RTGS</option><option>UPI</option><option>Cheque</option><option>Cash</option></select></div>
  <div class="fld"><label>UTR / Cheque no.</label><input id="a_ref"></div></div>
  <div class="note" id="a_hint"></div>
  <div class="mfoot"><button class="btn btn-o" onclick="closeM()">Cancel</button><button class="btn btn-p" onclick="saveAdvance()">Release advance</button></div>`);
  advHint();
}
function advHint(){
  const p=poById($('a_po').value),f=poFin(p);const amt=+$('a_amt').value||0;
  $('a_hint').innerHTML=`PO value <b>${fmt(p.total)}</b> · already paid <b>${fmt(f.paid)}</b> · this advance = <b>${p.total?Math.round(amt/p.total*100):0}%</b> of PO`;
}
async function saveAdvance(){
  const amt=+$('a_amt').value;
  if(!amt||amt<=0)return toast('Enter a valid amount');
  S.advances.push({id:nid('ADV'),poId:$('a_po').value,date:$('a_date').value,amount:amt,mode:$('a_mode').value,ref:$('a_ref').value.trim(),by:user});
  await saveAll();closeM();render();toast('Advance recorded');
}

/* ================= INVOICES ================= */
function rInvoices(){
  const rows=S.invoices.slice().reverse().map(inv=>{
    const p=poById(inv.poId),v=vById(p.vendorId);
    const paidAgainst=S.payments.filter(x=>x.invId===inv.id).reduce((s,x)=>s+ +x.amount,0);
    const st=paidAgainst>=inv.total?'<span class="chip c-ok">Paid</span>':paidAgainst>0?'<span class="chip c-warn">Part paid</span>':'<span class="chip c-info">Payable</span>';
    const match=Math.abs(poFin(p).invTot-p.total)<1?'<span class="chip c-ok">Matches PO</span>':poFin(p).invTot>p.total?'<span class="chip c-bad">Over PO!</span>':'<span class="chip c-mut">Partial</span>';
    return `<tr><td class="num"><b>${esc(inv.no)}</b></td><td>${dfmt(inv.date)}</td><td>${esc(v.name||'—')}</td><td class="ref">${inv.poId}</td>
    <td class="num">${fmt2(inv.total)}</td><td>${match}</td><td>${st}</td><td>${esc(inv.by||'')}</td></tr>`;
  }).join('');
  return `<div class="pagehead"><h2>Vendor Invoices</h2><span class="sub">Bills received, matched against POs</span><div class="grow"></div>
  <button class="btn btn-p" onclick="formInvoice()">+ Receive invoice</button></div>
  <div class="card">${S.invoices.length?`<div style="overflow-x:auto"><table><tr><th>Invoice no.</th><th>Date</th><th>Vendor</th><th>PO</th><th>Amount</th><th>PO match</th><th>Status</th><th>By</th></tr>${rows}</table></div>`
  :`<div class="empty"><b>No invoices received</b>When the vendor's bill arrives, record it here against its PO for 3-way matching.</div>`}</div>`;
}
function formInvoice(poId){
  const pos=S.pos.filter(p=>p.status==='Released');
  if(!pos.length)return toast('No released POs to bill against');
  openM(`<h3>Receive vendor invoice</h3>
  <div class="frow"><div class="fld"><label>Against PO *</label><select id="i_po">${pos.map(p=>`<option value="${p.id}" ${p.id===poId?'selected':''}>${p.id} — ${esc(vById(p.vendorId).name)}</option>`).join('')}</select></div>
  <div class="fld"><label>Vendor invoice no. *</label><input id="i_no"></div></div>
  <div class="frow f3"><div class="fld"><label>Invoice date</label><input type="date" id="i_date" value="${today()}"></div>
  <div class="fld"><label>Taxable value (₹)</label><input type="number" id="i_base" oninput="invCalc()"></div>
  <div class="fld"><label>GST (₹)</label><input type="number" id="i_gst" oninput="invCalc()"></div></div>
  <div class="frow"><div class="fld"><label>Invoice total (₹) *</label><input type="number" id="i_tot"></div>
  <div class="fld"><label>Material received OK? (GRN)</label><select id="i_grn"><option>Yes — received & checked</option><option>Partially received</option><option>Not yet received</option></select></div></div>
  <div class="frow f1"><div class="fld"><label>Remarks</label><input id="i_rem"></div></div>
  <div class="mfoot"><button class="btn btn-o" onclick="closeM()">Cancel</button><button class="btn btn-p" onclick="saveInvoice()">Record invoice</button></div>`);
}
function invCalc(){$('i_tot').value=((+$('i_base').value||0)+(+$('i_gst').value||0)).toFixed(2)}
async function saveInvoice(){
  const no=$('i_no').value.trim(),tot=+$('i_tot').value;
  if(!no)return toast('Invoice number required');
  if(!tot||tot<=0)return toast('Enter invoice total');
  S.invoices.push({id:nid('INV'),no,poId:$('i_po').value,date:$('i_date').value,base:+$('i_base').value||0,gstAmt:+$('i_gst').value||0,total:tot,grn:$('i_grn').value,remarks:$('i_rem').value.trim(),by:user});
  await saveAll();closeM();render();toast('Invoice recorded');
}

/* ================= PAYMENTS & LEDGER ================= */
function rPayments(){
  const rows=S.payments.slice().reverse().map(p=>{
    const po=poById(p.poId),v=vById(po.vendorId);
    const inv=S.invoices.find(i=>i.id===p.invId);
    return `<tr><td class="ref">${p.id}</td><td>${dfmt(p.date)}</td><td><b>${esc(v.name||'—')}</b></td><td class="ref">${p.poId}</td>
    <td class="num">${inv?esc(inv.no):'—'}</td><td>${esc(p.type)}</td><td class="num">${fmt(p.amount)}</td><td>${esc(p.mode)} <small class="num" style="color:var(--mut)">${esc(p.ref||'')}</small></td><td>${esc(p.by||'')}</td></tr>`;
  }).join('');
  const led=S.vendors.map(v=>{
    const pos=S.pos.filter(p=>p.vendorId===v.id&&p.status!=='Cancelled');
    if(!pos.length)return '';
    const t=pos.reduce((s,p)=>{const f=poFin(p);s.po+=+p.total;s.adv+=f.adv;s.inv+=f.invTot;s.paid+=f.paid;return s},{po:0,adv:0,inv:0,paid:0});
    const due=Math.max(0,t.inv-t.paid);
    return `<tr><td><b>${esc(v.name)}</b></td><td class="num">${fmt(t.po)}</td><td class="num">${fmt(t.adv)}</td><td class="num">${fmt(t.inv)}</td>
    <td class="num">${fmt(t.paid)}</td><td class="num" style="color:${due>0?'var(--bad)':'var(--ok)'}"><b>${fmt(due)}</b></td></tr>`;
  }).join('');
  return `<div class="pagehead"><h2>Payments & Vendor Ledger</h2><span class="sub">Outgoing payments and net position per vendor</span><div class="grow"></div>
  <button class="btn btn-p" onclick="formPayment()">+ Record payment</button></div>
  <div class="card"><div class="chead"><h3>Vendor ledger (live)</h3></div>
  ${led?`<div style="overflow-x:auto"><table><tr><th>Vendor</th><th>PO value</th><th>Advances</th><th>Invoiced</th><th>Total paid</th><th>Due now</th></tr>${led}</table></div>`:`<div class="empty">Ledger builds automatically once POs exist.</div>`}</div>
  <div class="card"><div class="chead"><h3>Payment history</h3></div>
  ${S.payments.length?`<div style="overflow-x:auto"><table><tr><th>Ref</th><th>Date</th><th>Vendor</th><th>PO</th><th>Invoice</th><th>Type</th><th>Amount</th><th>Mode / UTR</th><th>By</th></tr>${rows}</table></div>`
  :`<div class="empty"><b>No payments recorded</b>Advances appear in the ledger automatically; record invoice payments here.</div>`}</div>`;
}
function formPayment(poId){
  const pos=S.pos.filter(p=>p.status!=='Draft'&&p.status!=='Cancelled');
  if(!pos.length)return toast('No active POs');
  const posWithInv=pos.filter(p=>S.invoices.some(i=>i.poId===p.id));
  if(!posWithInv.length)return toast('No invoices received yet — payment can only be made after a tax invoice is recorded against the PO');
  openM(`<h3>Record vendor payment</h3>
  <div class="note">Payments are processed only against POs with received tax invoices, as per company policy.</div>
  <div class="frow"><div class="fld"><label>Against PO *</label><select id="y_po" onchange="payInvOpts()">${posWithInv.map(p=>`<option value="${p.id}" ${p.id===poId?'selected':''}>${p.id} — ${esc(vById(p.vendorId).name)}</option>`).join('')}</select></div>
  <div class="fld"><label>Against invoice *</label><select id="y_inv"></select></div></div>
  <div class="frow f3"><div class="fld"><label>Payment type</label><select id="y_type"><option>Against invoice</option><option>Part / progress payment</option><option>Final payment</option><option>Retention release</option><option>Debit adjustment</option></select></div>
  <div class="fld"><label>Amount (₹) *</label><input type="number" id="y_amt"></div>
  <div class="fld"><label>Date</label><input type="date" id="y_date" value="${today()}"></div></div>
  <div class="frow"><div class="fld"><label>Mode</label><select id="y_mode"><option>NEFT/RTGS</option><option>UPI</option><option>Cheque</option><option>Cash</option></select></div>
  <div class="fld"><label>UTR / Cheque no.</label><input id="y_ref"></div></div>
  <div class="note" id="y_hint"></div>
  <div class="mfoot"><button class="btn btn-o" onclick="closeM()">Cancel</button><button class="btn btn-p" onclick="savePayment()">Record payment</button></div>`);
  payInvOpts();
}
function payInvOpts(){
  const poId=$('y_po').value;
  const invs=S.invoices.filter(i=>i.poId===poId);
  $('y_inv').innerHTML=invs.length?invs.map(i=>`<option value="${i.id}">${esc(i.no)} (${fmt(i.total)})</option>`).join('')
    :`<option value="">— No invoices on this PO —</option>`;
  const p=poById(poId),f=poFin(p);
  $('y_hint').innerHTML=`PO <b>${fmt(p.total)}</b> · invoiced <b>${fmt(f.invTot)}</b> · paid incl. advance <b>${fmt(f.paid)}</b> · balance <b style="color:${f.balance>0?'var(--warn)':'var(--ok)'}">${fmt(f.balance)}</b>`;
}
async function savePayment(){
  const amt=+$('y_amt').value;
  if(!amt||amt<=0)return toast('Enter a valid amount');
  const invId=$('y_inv').value;
  if(!invId)return toast('Select an invoice — payment requires a received tax invoice');
  S.payments.push({id:nid('PAY'),poId:$('y_po').value,invId:invId,type:$('y_type').value,amount:amt,date:$('y_date').value,mode:$('y_mode').value,ref:$('y_ref').value.trim(),by:user});
  await saveAll();closeM();render();toast('Payment recorded');
}

/* ================= SITE EXPENSES & CLIENT RECEIPTS ================= */
function rExpRct(){
  const erows=S.expenses.slice().reverse().map(e=>{
    const pr=prById(e.projectId);
    return `<tr><td class="ref">${e.id}</td><td>${dfmt(e.date)}</td><td><span class="ref">${pr.id||''}</span> ${esc(pr.name||'—')}</td>
    <td>${esc(e.category)}</td><td>${esc(e.desc||'')}</td><td class="num">${fmt(e.amount)}</td><td>${esc(e.mode||'')}</td><td>${esc(e.by||'')}</td>
    <td><button class="btn btn-danger btn-sm" onclick="delExp('${e.id}')">✕</button></td></tr>`;
  }).join('');
  const rrows=S.receipts.slice().reverse().map(r=>{
    const pr=prById(r.projectId);
    return `<tr><td class="ref">${r.id}</td><td>${dfmt(r.date)}</td><td><span class="ref">${pr.id||''}</span> ${esc(pr.name||'—')}</td>
    <td>${esc(pr.client||'')}</td><td>${esc(r.stage||'')}</td><td class="num">${fmt(r.amount)}</td><td>${esc(r.mode||'')} <small class="num" style="color:var(--mut)">${esc(r.ref||'')}</small></td><td>${esc(r.by||'')}</td>
    <td><button class="btn btn-danger btn-sm" onclick="delRct('${r.id}')">✕</button></td></tr>`;
  }).join('');
  return `<div class="pagehead"><h2>Expenses & Client Receipts</h2><span class="sub">Labour, site costs and money received from clients — all project-wise</span><div class="grow"></div>
  <button class="btn btn-o" onclick="formExpense()">+ Site expense</button>
  <button class="btn btn-p" onclick="formReceipt()">+ Client receipt</button></div>
  <div class="card"><div class="chead"><h3>Client receipts (money in)</h3></div>
  ${rrows?`<div style="overflow-x:auto"><table><tr><th>Ref</th><th>Date</th><th>Project</th><th>Client</th><th>Stage / against</th><th>Amount</th><th>Mode / UTR</th><th>By</th><th></th></tr>${rrows}</table></div>`
  :`<div class="empty"><b>No receipts yet</b>Record advances and stage payments received from clients here — they feed each project's cash position.</div>`}</div>
  <div class="card"><div class="chead"><h3>Site expenses (money out, non-PO)</h3></div>
  ${erows?`<div style="overflow-x:auto"><table><tr><th>Ref</th><th>Date</th><th>Project</th><th>Category</th><th>Description</th><th>Amount</th><th>Mode</th><th>By</th><th></th></tr>${erows}</table></div>`
  :`<div class="empty"><b>No expenses yet</b>Labour, transport, site consumables and other non-PO costs go here — they count into project cost and margin.</div>`}</div>`;
}

function formExpense(projectId){
  if(!S.projects.length)return toast('Create a project first');
  openM(`<h3>Record site expense</h3>
  <div class="frow"><div class="fld"><label>Project *</label><select id="e_prj">${S.projects.map(p=>`<option value="${p.id}" ${p.id===projectId?'selected':''}>${p.id} — ${esc(p.name)}</option>`).join('')}</select></div>
  <div class="fld"><label>Date</label><input type="date" id="e_date" value="${today()}"></div></div>
  <div class="frow f3"><div class="fld"><label>Category</label><select id="e_cat">${['Labour','Transport','Equipment hire','Site consumables','Fuel','Food & stay','Statutory / fees','Petty cash','Other'].map(c=>`<option>${c}</option>`).join('')}</select></div>
  <div class="fld"><label>Amount (₹) *</label><input type="number" id="e_amt"></div>
  <div class="fld"><label>Mode</label><select id="e_mode"><option>Cash</option><option>UPI</option><option>NEFT/RTGS</option><option>Cheque</option></select></div></div>
  <div class="frow f1"><div class="fld"><label>Description</label><input id="e_desc" placeholder="e.g. Mason team — 6 days, week 23"></div></div>
  <div class="mfoot"><button class="btn btn-o" onclick="closeM()">Cancel</button><button class="btn btn-p" onclick="saveExpense()">Record expense</button></div>`);
}
async function saveExpense(){
  const amt=+$('e_amt').value;
  if(!amt||amt<=0)return toast('Enter a valid amount');
  S.expenses.push({id:nid('EXP'),projectId:$('e_prj').value,date:$('e_date').value,category:$('e_cat').value,amount:amt,mode:$('e_mode').value,desc:$('e_desc').value.trim(),by:user});
  await saveAll();closeM();render();toast('Expense recorded');
}
async function delExp(id){
  if(!confirm('Delete this expense?'))return;
  S.expenses=S.expenses.filter(e=>e.id!==id);await saveAll();render();
}

function formReceipt(projectId){
  if(!S.projects.length)return toast('Create a project first');
  openM(`<h3>Record client receipt</h3>
  <div class="frow"><div class="fld"><label>Project *</label><select id="r_prj" onchange="rctHint()">${S.projects.map(p=>`<option value="${p.id}" ${p.id===projectId?'selected':''}>${p.id} — ${esc(p.name)} (${esc(p.client)})</option>`).join('')}</select></div>
  <div class="fld"><label>Date</label><input type="date" id="r_date" value="${today()}"></div></div>
  <div class="frow f3"><div class="fld"><label>Stage / against</label><select id="r_stage">${['Booking advance','Mobilisation advance','Stage payment','Running bill','Final settlement','Retention release','Other'].map(c=>`<option>${c}</option>`).join('')}</select></div>
  <div class="fld"><label>Amount (₹) *</label><input type="number" id="r_amt" oninput="rctHint()"></div>
  <div class="fld"><label>Mode</label><select id="r_mode"><option>NEFT/RTGS</option><option>UPI</option><option>Cheque</option><option>Cash</option></select></div></div>
  <div class="frow"><div class="fld"><label>UTR / Cheque no.</label><input id="r_ref"></div>
  <div class="fld"><label>Remarks</label><input id="r_rem"></div></div>
  <div class="note" id="r_hint"></div>
  <div class="mfoot"><button class="btn btn-o" onclick="closeM()">Cancel</button><button class="btn btn-p" onclick="saveReceipt()">Record receipt</button></div>`);
  rctHint();
}
function rctHint(){
  const pr=prById($('r_prj').value),f=prFin(pr);
  $('r_hint').innerHTML=`Contract <b>${fmt(pr.value)}</b> · received so far <b>${fmt(f.rcv)}</b> · balance to collect <b style="color:${f.toCollect>0?'var(--warn)':'var(--ok)'}">${fmt(Math.max(0,f.toCollect))}</b>`;
}
async function saveReceipt(){
  const amt=+$('r_amt').value;
  if(!amt||amt<=0)return toast('Enter a valid amount');
  S.receipts.push({id:nid('RCT'),projectId:$('r_prj').value,date:$('r_date').value,stage:$('r_stage').value,amount:amt,mode:$('r_mode').value,ref:$('r_ref').value.trim(),remarks:$('r_rem').value.trim(),by:user});
  await saveAll();closeM();render();toast('Receipt recorded');
}
async function delRct(id){
  if(!confirm('Delete this receipt?'))return;
  S.receipts=S.receipts.filter(r=>r.id!==id);await saveAll();render();
}

/* ================= EXCEL BACKUP EXPORT ================= */
function exportXLSX(){
  if(typeof XLSX==='undefined')return toast('Excel library not loaded — check connection and retry');
  try{
    const wb=XLSX.utils.book_new();
    const add=(name,rows)=>XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows.length?rows:[{Note:'No records yet'}]),name);

    add('Projects P&L',S.projects.map(pr=>{const f=prFin(pr);return{
      'Project ID':pr.id,'Project':pr.name,'Client':pr.client,'Location':pr.location||'','Status':pr.status,
      'Start':pr.start||'','Contract Value':+pr.value||0,'Procurement Budget':+pr.budget||0,
      'PO Committed':f.committed,'Site Expenses':f.exp,'Total Cost':f.cost,
      'Received From Client':f.rcv,'Paid To Vendors':f.paid,'Cash Position':f.cash,
      'Margin':f.margin,'Margin %':+f.marginPct.toFixed(2),'Balance To Collect':Math.max(0,f.toCollect)}}));

    add('Vendors',S.vendors.map(v=>({'Vendor ID':v.id,'Name':v.name,'Category':v.category||'','Materials/Scope':v.materials||'',
      'Contact':v.contact||'','Phone':v.phone||'','Email':v.email||'','GSTIN':v.gstin||'','PAN':v.pan||'',
      'Bank A/c':v.bankAcc||'','IFSC':v.ifsc||'','Payment Terms':v.terms||'','Address':v.address||'',
      'KYC Status':v.kycStatus||'Pending','KYC Docs':(v.kycDocs||[]).map(d=>d.type+': '+d.name).join('; ')})));

    add('Purchase Orders',S.pos.map(p=>{const f=poFin(p),v=vById(p.vendorId);return{
      'PO No':p.id,'Date':p.date||'','Project ID':p.projectId||'','Project':p.project||'','Client':p.client||'',
      'Vendor':v.name||'','Vendor GSTIN':v.gstin||'','Status':p.status,'Delivery By':p.delivery||'',
      'Payment Terms':p.terms||'','Subtotal':+p.sub||0,'GST %':p.gstP,'GST Amt':+p.gst||0,'PO Total':+p.total||0,
      'Advance Paid':f.adv,'Invoiced':f.invTot,'Total Paid':f.paid,'Balance':f.balance,'Created By':p.createdBy||'','Notes':p.notes||''}}));

    const liRows=[];S.pos.forEach(p=>(p.items||[]).forEach(it=>liRows.push({'PO No':p.id,'Project ID':p.projectId||'',
      'Vendor':vById(p.vendorId).name||'','Item':it.desc,'Unit':it.unit,'Qty':+it.qty||0,'Rate':+it.rate||0,'Amount':(+it.qty||0)*(+it.rate||0)})));
    add('PO Line Items',liRows);

    add('Advances',S.advances.map(a=>{const p=poById(a.poId);return{'Ref':a.id,'Date':a.date||'','PO No':a.poId,
      'Project ID':p.projectId||'','Vendor':vById(p.vendorId).name||'','Amount':+a.amount||0,'Mode':a.mode||'','UTR/Cheque':a.ref||'','By':a.by||''}}));

    add('Invoices',S.invoices.map(i=>{const p=poById(i.poId);const paid=S.payments.filter(x=>x.invId===i.id).reduce((s,x)=>s+ +x.amount,0);return{
      'Ref':i.id,'Vendor Invoice No':i.no,'Date':i.date||'','PO No':i.poId,'Project ID':p.projectId||'',
      'Vendor':vById(p.vendorId).name||'','Taxable':+i.base||0,'GST':+i.gstAmt||0,'Total':+i.total||0,
      'GRN/Material':i.grn||'','Paid Against':paid,'Remarks':i.remarks||'','By':i.by||''}}));

    add('Payments',S.payments.map(p=>{const po=poById(p.poId);const inv=S.invoices.find(i=>i.id===p.invId);return{
      'Ref':p.id,'Date':p.date||'','PO No':p.poId,'Project ID':po.projectId||'','Vendor':vById(po.vendorId).name||'',
      'Invoice':inv?inv.no:'','Type':p.type,'Amount':+p.amount||0,'Mode':p.mode||'','UTR/Cheque':p.ref||'','By':p.by||''}}));

    add('Site Expenses',S.expenses.map(e=>{const pr=prById(e.projectId);return{'Ref':e.id,'Date':e.date||'',
      'Project ID':e.projectId,'Project':pr.name||'','Category':e.category,'Description':e.desc||'','Amount':+e.amount||0,'Mode':e.mode||'','By':e.by||''}}));

    add('Client Receipts',S.receipts.map(r=>{const pr=prById(r.projectId);return{'Ref':r.id,'Date':r.date||'',
      'Project ID':r.projectId,'Project':pr.name||'','Client':pr.client||'','Stage':r.stage||'','Amount':+r.amount||0,
      'Mode':r.mode||'','UTR/Cheque':r.ref||'','Remarks':r.remarks||'','By':r.by||''}}));

    add('Vendor Ledger',S.vendors.map(v=>{
      const pos=S.pos.filter(p=>p.vendorId===v.id&&p.status!=='Cancelled');
      const t=pos.reduce((s,p)=>{const f=poFin(p);s.po+=+p.total;s.adv+=f.adv;s.inv+=f.invTot;s.paid+=f.paid;return s},{po:0,adv:0,inv:0,paid:0});
      return{'Vendor':v.name,'GSTIN':v.gstin||'','PO Value':t.po,'Advances':t.adv,'Invoiced':t.inv,'Total Paid':t.paid,'Due Now':Math.max(0,t.inv-t.paid)}}));

    XLSX.writeFile(wb,'LintelSpace-SupplyChain-Backup-'+today()+'.xlsx');
    toast('Backup downloaded — keep it safe');
  }catch(e){toast('Export failed: '+e.message)}
}
